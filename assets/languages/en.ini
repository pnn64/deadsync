SelectColorHelp=Show or skip Select Color during startup.
SelectStyleHelp=Show or skip Select Style during startup.
PreferredStyleHelp=Applied when Select Style is Off.
SelectPlayModeHelp=Show or skip Select Play Mode during startup.
PreferredModeHelp=Applied when Select Play Mode is Off.
EvalSummaryHelp=Show or skip the Evaluation Summary flow after leaving song/course select.
NameEntryHelp=Show or skip Name Entry after Evaluation Summary.
