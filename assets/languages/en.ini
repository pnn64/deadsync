; ============================================================
; Options Help — Null-or-Die submenu
; ============================================================
[OptionsNullOrDieHelp]
SyncGraphHelp=Choose which null-or-die graph the Select Music sync overlay shows.\nFrequency: weighted spectral accumulator.\nBeat index: per-beat digest over time.\nPost-kernel fingerprint: convolution heatmap with the final kernel response.
SyncConfidenceHelp=Set the minimum confidence required for Sync Pack saves.\nCharts below this value are analyzed and shown, but skipped when saving a pack.\nSingle-song sync still allows saving below the threshold and shows a warning instead.
PackSyncThreadsHelp=Set worker threads used for pack/all sync null-or-die analysis.\nAuto uses all logical cores; 1 keeps analysis single-threaded.\nDefault: Auto (PackSyncThreads=0).
FingerprintHelp=Set the fingerprint width used around each beat during bias analysis.\nSmaller values focus more tightly around each beat; larger values compare a wider window.
WindowHelp=Set the spectrogram window size in milliseconds.\nThis changes how much audio is analyzed per FFT slice.
StepHelp=Set the spectrogram step size in milliseconds.\nLower values sample more densely and can increase analysis cost.
MagicOffsetHelp=Add a fixed offset to the final estimated bias.\nUseful for testing alternate parity assumptions without editing simfiles.
KernelTargetHelp=Choose whether the kernel operates on digest or accumulator data.\nDigest matches the current default.
KernelTypeHelp=Choose the kernel shape used for the post-processing convolution.\nRising matches the current default.
FullSpectrogramHelp=Allow the full-spectrogram fingerprint path when null-or-die decides it is appropriate.\nThis may use more memory or work for some charts.

; ============================================================
; Options Help — Sync Pack submenu
; ============================================================
[OptionsSyncPackHelp]
SyncPackPackHelp=Choose which installed packs to include in the sync run.\nAll Packs analyzes every installed pack; any specific pack limits the run to that pack.
SyncPackStartHelp=Open the local sync review overlay for the selected pack filter.\nUse All Packs to analyze every installed pack in one pass.

; ============================================================
; Options Help — Score Import submenu
; ============================================================
[OptionsScoreImportHelp]
ScoreImportEndpointHelp=Choose the source endpoint to import scores from.\nGrooveStats, BoogieStats, or ArrowCloud.
ScoreImportProfileHelp=Select a local profile that has credentials configured for this endpoint.\nGS/BS require API key + username in groovestats.ini.\nAC requires API key in arrowcloud.ini.
ScoreImportPackHelp=Choose which installed pack to include in score import.\nUse All to import across every installed pack.
ScoreImportOnlyMissingHelp=When Yes, import only charts with no cached GS score yet.\nWhen No, request every selected chart hash.
ScoreImportStartHelp=Bulk-imports this profile's scores for the selected endpoint and pack filter.\nHard-limited to 3 requests/sec to avoid API spam.\nFor many charts, this can take more than one hour.
