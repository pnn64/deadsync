WriteCurrentScreenHelp=Write the active screen name to save/current_screen.txt on each transition.
MenuMusicHelp=Play or mute the looping menu song on Select Color/Style/Play Mode.
ReplaysHelp=Enable local replay recording during gameplay.\nWhen Off, Select Music hides the Play Replay option.
PerPlayerGlobalOffsetsHelp=Allow each player profile to add a personal timing shift in Player Options.\nThis shift is applied on top of the machine global offset.
KeyboardFeaturesHelp=Enable keyboard-only shortcuts like Ctrl+R restart in gameplay and evaluation.
VideoBgsHelp=Animate gameplay background movies.\nWhen Off, video BGs use the first-frame poster instead.

