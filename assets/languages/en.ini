; ============================================================
; Options Help — Graphics submenu
; ============================================================
[OptionsGraphicsHelp]
VideoRendererHelp=Select the rendering backend.
SoftwareRendererThreadsHelp=Shown only when Video Renderer is Software.\nSet how many CPU threads software rendering can use.
DisplayModeHelp=Choose how the window is presented on screen.
DisplayAspectRatioHelp=Set the aspect ratio used for rendering.
DisplayResolutionHelp=Pick a rendering resolution.
RefreshRateHelp=Pick a target display refresh rate.
FullscreenTypeHelp=Choose between exclusive or borderless fullscreen.
VSyncHelp=Enable vertical sync.
PresentModeHelp=Choose the present mode policy used when VSync is off.\nMailbox prefers tear-free low-latency presentation and keeps present back-pressure on.\nImmediate prefers the lowest-latency uncapped path and may tear.
MaxFpsHelp=Enable an optional redraw cap used when VSync is off.\nNo leaves redraw scheduling uncapped.
MaxFpsValueHelp=Choose the redraw cap used when Max FPS is enabled.\nValues adjust in 5 FPS steps.
ShowStatsHelp=Choose performance overlay mode: Off, FPS only, FPS with stutter list, or FPS+Stutter+Timing.\nThe timing mode adds present prediction, fallback, queue-pressure, and clock-domain details.
ValidationLayersHelp=Enable Vulkan/D3D/OpenGL validation layers for graphics debugging.\nRecommended: Off (FPS will drop by half but useful for debugging).
VisualDelayHelp=Apply a visual timing offset in 1 ms steps.

; ============================================================
; Options Help — Sound submenu
; ============================================================
[OptionsSoundHelp]
SoundDeviceHelp=Select an output device detected at startup.\nAuto uses the host default output device.\nWindows playback prefers native WASAPI.\nmacOS playback prefers native CoreAudio.\nFreeBSD playback prefers native PCM/OSS.\nLinux backend routing depends on Linux Audio Backend; ALSA exclusive routing is configured separately.\nChanging this takes effect on next launch.
AudioOutputModeHelp=Select whether audio output should use Auto or Shared mode.\nAuto keeps the backend default policy.\nShared forces shared-mode output where supported.\nExclusive mode is exposed separately when Linux Audio Backend is set to ALSA.\nChanging this takes effect on next launch.
LinuxAudioBackendHelp=Select which Linux backend to prefer.\nBackends shown in this menu depend on what this build includes.\nAuto prefers PipeWire first when available, then PulseAudio, and falls back to ALSA as needed.\nPipeWire and PulseAudio are shared-output backends and currently ignore explicit Sound Device selection.\nJACK is an explicit low-latency backend and currently ignores Sound Device selection.\nALSA is the direct Linux backend and exposes the child Exclusive Mode row.\nChanging this takes effect on next launch.
AlsaExclusiveHelp=Request ALSA exclusive output for the selected device.\nOff keeps ALSA in the normal shared path.\nOn requires a direct hw/plughw device or a resolvable hardware-backed alias.\nChanging this takes effect on next launch.
AudioSampleRateHelp=Select an audio output sample rate for the chosen Sound Device.
MasterVolumeHelp=Set the overall volume for all audio.
SfxVolumeHelp=Set the sound-effect volume before master volume is applied.
AssistTickVolumeHelp=Set the gameplay Assist Tick volume before master volume is applied.
MusicVolumeHelp=Set the music volume before master volume is applied.
MineSoundsHelp=Play a sound when mines are hit.
GlobalOffsetHelp=Apply a global audio timing offset in 1 ms steps.
RateModPreservesPitchHelp=Keep pitch constant when rate mods are active.

; ============================================================
; Options Help — Input submenu
; ============================================================
[OptionsInputHelp]
ConfigureMappingsHelp=Map keyboard keys, panels, menu buttons, etc. to game functions.
TestInputHelp=Test your dance pad/controller and menu buttons.\n\nIf one of your buttons is not mapped to a game function, it will appear here as "not mapped".
InputOptionsHelp=Open additional input settings.
GamepadBackendHelp=Choose gamepad input backend. On Windows Raw Input is the default path and WGI remains available as a compatibility fallback.\nChanging backend requires a restart.
UseFSRsHelp=Enable direct FSR diagnostics in Test Input for supported pads. This reads the device directly instead of relying on the gameplay input backend.\nDefault is No.
MenuButtonsHelp=Choose whether to allow using gameplay buttons (e.g. directional arrows) for menu navigation.\nUse Gameplay Buttons - Navigate through the game using your dance pad.\nOnly Dedicated Buttons - Navigate through the game using dedicated menu buttons.\nFive Key Menu requires MenuUp, MenuDown, MenuLeft, and MenuRight for at least one player.\nThree Key Menu requires MenuLeft, MenuRight, and Start for at least one player.
OptionsNavigationHelp=Choose how Player Options style screens advance between rows.\nStepMania Style - Up/Down changes rows and Start jumps to Exit.\nArcade Style - Start advances to the next row and the active row shows a down-pointer indicator.
MenuNavigationHelp=Choose whether cabinet-style menu navigation expects five buttons or three buttons per player.\nFive Key Menu - Use MenuLeft, MenuRight, MenuUp, MenuDown, and Start.\nThree Key Menu - Use MenuLeft, MenuRight, and Start.\nWhen enabled, some UI actions move from Select to a simultaneous Left+Right chord.
DebounceHelp=Global per-input debounce window used across menus and gameplay for keyboard and all gamepad drivers.\nITGmania default is 20ms. 50ms was common on older arcade pads.

