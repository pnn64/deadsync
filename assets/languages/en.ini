ComboOffsetXHelp=Adjust the horizontal position of the combo counter.
ComboOffsetYHelp=Adjust the vertical position of the combo counter.
HoldJudgmentHelp=Change the judgment graphics displayed for hold notes.
BackgroundFilterHelp=Darken the underside of the playing field.\nThis will partially obscure background art.
NoteFieldOffsetXHelp=Adjust the horizontal position of the notefield (relative to the\ncenter).
NoteFieldOffsetYHelp=Adjust the vertical position of the notefield.
VisualDelayHelp=Player specific visual delay. Negative values shifts the arrows\nupwards, while positive values move them down.
GlobalOffsetShiftHelp=Player specific timing shift added on top of the machine global\noffset. Use this for controller-specific latency differences.
MusicRateHelp=Change the native speed of the music itself.
StepchartHelp=Choose the stepchart you wish to play.
WhatComesNextHelp=Go back and choose a different chart or change additional\nmodifiers.
DataVisualizationsHelp=Show additional graphs during gameplay and evaluation.
TargetScoreMissPolicyHelp=Decide what happens if you fall behind your target score.
MiniIndicatorHelp=Display subtractive, predictive, paced, rival, or stream-progress\nmini indicator on-screen.
ComboColorModeHelp=Choose whether combo colors use full combo or current combo.
LifeBarOptionsHelp=Adjust the aesthetics of the lifebar display.
TimingWindowsHelp=Disable or simplify specific timing windows used for judgments.
ResultsExtrasHelp=Show early-hit subtotals and rescored early-hit totals on evaluation.
TurnHelp=Apply simple transforms to the arrow directions.
ScrollHelp=Change how notes scroll relative to the receptors.
HideHelp=Hide parts of the gameplay UI.
LifeMeterTypeHelp=Change the style of the lifebar.
DensityGraphBackgroundHelp=Choose solid or transparent gameplay density graph background.
TargetScoreHelp=Choose a grade or score to chase.
IndicatorScoreTypeHelp=Choose which score formula the mini indicator tracks:\nITG, EX (FA+), or H.EX (Hard EX).
GameplayExtrasHelp=Extra feedback helpers shown during gameplay.
ComboColorsHelp=Choose whether to show combo color by glowing, solid color, rainbow,\nor none.
CarryComboHelp=Carry current combo into the next song.
JudgmentTiltHelp=Toggle left/right tilt for judgment sprites.
JudgmentTiltIntensityHelp=How strongly to tilt judgments left/right.
JudgmentBehindArrowsHelp=Render judgment text, offset indicator, and error bar behind arrows.
OffsetIndicatorHelp=Show zmod-style per-tap offset text (e.g. -4.52ms).
ErrorBarHelp=Toggle Colorful/Monochrome bars and Text early/late indicator.
ErrorBarTrimHelp=Set the worst timing window that the error bar will show.
ErrorBarOptionsHelp=Adjust where the error bar appears and whether it shows multiple tick marks.
ErrorBarOffsetXHelp=Adjust the horizontal position of the error bar.
ErrorBarOffsetYHelp=Adjust the vertical position of the error bar.
MeasureCounterHelp=Display a count of how long you have been streaming a specific type of note.
MeasureCounterLookaheadHelp=Set how many upcoming stream/break segments are displayed by the measure counter.
MeasureCounterOptionsHelp=Change how the Measure Counter is positioned and which extra displays are enabled.
MeasureLinesHelp=Display horizontal lines on the notefield to indicate quantization.
RescoreEarlyHitsHelp=Allow early hits of Decents and Way Offs to be rescored to better judgments.
EarlyDecentWayOffOptionsHelp=Set how early Decent and Way Off judgments are visually represented.
