BannerCacheHelp=Enable or disable the wheel banner cache on disk.\nDefault: On (BannerCache=1).
CdTitleCacheHelp=Enable or disable CDTitle raw texture cache on disk.\nDefault: On (CDTitleCache=1).
SongParsingThreadsHelp=Set worker threads for simfile parsing at startup.\nDefault: Auto (SongParsingThreads=0).
CacheSongsHelp=Enable or disable writing/using cached song metadata.\nDefault: On (CacheSongs=1).
FastLoadHelp=Enable startup shortcuts that reduce blocking load work.\nDefault: On (FastLoad=1).

