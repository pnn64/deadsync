[OptionsSelectMusicHelp]
ShowBannersHelp=Show song/pack banners or force color fallback banners.
ShowVideoBannersHelp=Animate MP4 banner files when a selection is settled.\nWhen No, video banners use the cached poster frame only.
ShowBreakdownHelp=Show or hide the stream breakdown panel in Select Music.
BreakdownStyleHelp=Choose which breakdown format to show in Select Music.\nSL uses Simply Love stream breakdown formatting.\nSN uses Stamina Nation stream breakdown formatting.
ShowNativeLanguageHelp=Choose how wheel titles are displayed.\nTranslit uses transliterated tags when available; Native uses original tags.
MusicWheelSpeedHelp=Set Select Music wheel hold-scroll speed.\nParity mapping: Slow=5, Normal=10, Fast=15, Faster=25, Ridiculous=30, Ludicrous=45, Plaid=100.
MusicWheelStyleHelp=Choose how expanded packs appear on the wheel.\nITG keeps other pack headers visible while the active pack's songs are shown.\nIIDX hides every other pack and keeps only the active pack header visible.
ShowCdTitlesHelp=Show or hide CDTitle sprites on Select Music.
ShowWheelGradesHelp=Show or hide grade sprites on wheel rows.
ShowWheelLampsHelp=Show or hide lamp indicators on wheel rows.
ItlWheelDataHelp=Choose how local ITL song data appears on wheel rows.\nScore matches the original single-line EX display.\nPoints+Score stacks song points above EX with a smaller Wendy readout.
NewPackBadgeHelp=Show NEW on pack headers in Group sort.\nOpen Pack clears the badge when you expand that pack.\nHas Score shows NEW until any song in the pack has a cached local or imported score for a joined player.\nOff disables the badge and treats newly-scanned packs as seen.
ShowPatternInfoHelp=Choose whether the lower chart info panel favors Tech, Stamina, or Auto detection.\nRecommended: Tech.
ChartInfoHelp=Choose which chart info metric appears above the breakdown string.\nUse Left/Right to select Peak NPS or Matrix Rating, then Start to toggle each option.\nAt least one metric always stays enabled.
MusicPreviewsHelp=Enable or disable Select Music audio previews.
PreviewMarkerHelp=Show a white line over the density graph for the current preview position.\nOnly appears while music previews are playing.
LoopMusicHelp=Choose whether previews loop or play once.
ShowGameplayTimerHelp=Show the gameplay session timer on Select Music.
ShowGsBoxHelp=Show GS box in Select Music pane/scorebox areas when available.\nGS box will not show unless GrooveStats/BoogieStats/ArrowCloud is enabled and connected.
GsBoxPlacementHelp=Auto keeps the current placement rules.\nStep Pane always anchors the GS box over the step pane when shown.
GsBoxLeaderboardsHelp=Choose which leaderboards the GS box cycles through.\nUse Left/Right to select ITG/EX/H.EX/Tournaments, then Start to toggle each option.

