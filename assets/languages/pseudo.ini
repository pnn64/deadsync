ConfigurePadsHelp=[Víéw áńđ éđíť šéńšóŕ ťhŕéšhóĺđš óń çóńńéçťéđ páđš (ŠťépMáńíáX, éťç.). Páđš šhów šíđé bý šíđé; Ĺéfť/Ŕíghť píçk á páńéĺ, Úp/Đówń áđjúšť íťš ťhŕéšhóĺđ. Éđíťš áŕé wŕíťťéń šťŕáíghť ťó ťhé páđ.\nÍf ĐéáđŠýńç Máńágéš Páđ Çóńfíg íš óń, ĐéáđŠýńç wíĺĺ óvéŕwŕíťé ťhéšé éđíťš (óń ĺáúńçh, óŕ whéń ťhé áçťívé pŕófíĺé óŕ páđ çháńgéš), šó šávé ťúńíńgš áš pŕófíĺéš fŕóm Šóńg Šéĺéçť íńšťéáđ. Wíťh íť óff, ýóúŕ éđíťš šťáý óń ťhé páđ.__________________________________________________________________________________________________]
