ShowWheelGradesHelp=Visa eller dölj betygssprites på hjulrader.
ShowWheelLampsHelp=Visa eller dölj lampindikatorer på hjulrader.
ItlWheelDataHelp=Välj hur lokal ITL-låtdata visas på hjulrader.\nScore matchar den ursprungliga enradiga EX-visningen.\nPoints+Score staplar låtpoäng ovanför EX med en mindre Wendy-visning.
NewPackBadgeHelp=Visa NEW på paketrubriker i gruppsortering.\nÖppna paket tar bort märket när du expanderar paketet.\nHar poäng visar NEW tills någon låt i paketet har ett cachat lokalt eller importerat resultat för en ansluten spelare.\nAv inaktiverar märket och behandlar nyligen skannade paket som sedda.
ShowPatternInfoHelp=Välj om den nedre chartinfopanelen ska fokusera på Tech, Stamina eller Auto-detektering.\nRekommenderat: Tech.
ChartInfoHelp=Välj vilket chartmått som visas ovanför breakdown-strängen.\nAnvänd vänster/höger för att välja Topp-NPS eller Matrisbetyg, och Start för att växla varje alternativ.\nMinst ett mått måste alltid vara aktiverat.
MusicPreviewsHelp=Aktivera eller inaktivera ljudförhandsvisningar i Välj musik.
PreviewMarkerHelp=Visa en vit linje över densitetsgrafen för aktuell förhandsvisningsposition.\nVisas bara medan musikförhandsvisningar spelas.
LoopMusicHelp=Välj om förhandsvisningar ska loopa eller spelas en gång.
ShowGameplayTimerHelp=Visa sessionstimern under spel i Välj musik.
ShowGsBoxHelp=Visa GS-rutan i panel-/scorebox-områden i Välj musik när den finns.\nGS-rutan visas inte om inte GrooveStats/BoogieStats/ArrowCloud är aktiverat och anslutet.
GsBoxPlacementHelp=Auto behåller de nuvarande placeringsreglerna.\nStep Pane fäster alltid GS-rutan ovanpå stegrutan när den visas.
GsBoxLeaderboardsHelp=Välj vilka topplistor GS-rutan ska växla mellan.\nAnvänd vänster/höger för att välja ITG/EX/H.EX/Turneringar, sedan Start för att växla varje alternativ.

[OptionsAdvancedHelp]
DefaultFailTypeHelp=Välj maskinens fail-beteende när spellivet når noll.\nImmediate: hoppar till utvärdering så fort alla anslutna spelare failat.\nImmediateContinue: fortsätt spela till låtens slut efter fail.\nStandard: ImmediateContinue (rekommenderas).
BannerCacheHelp=Aktivera eller inaktivera banner-cachen på disk.\nStandard: På (BannerCache=1).
CdTitleCacheHelp=Aktivera eller inaktivera råtextur-cachen för CDTitle på disk.\nStandard: På (CDTitleCache=1).
SongParsingThreadsHelp=Ställ in arbetstrådar för simfile-parsning vid uppstart.\nStandard: Auto (SongParsingThreads=0).
CacheSongsHelp=Aktivera eller inaktivera skrivning/användning av cachad låtmetadata.\nStandard: På (CacheSongs=1).
FastLoadHelp=Aktivera genvägar vid uppstart som minskar blockerande laddarbete.\nStandard: På (FastLoad=1).

[OptionsCourseHelp]
ShowRandomCoursesHelp=Visa eller dölj kurser som innehåller slumpmässiga stage-poster (t.ex. RANDOM/group/*).
ShowMostPlayedHelp=Visa eller dölj kurser som innehåller MostPlayed/BEST-sorteringsval.
ShowIndividualScoresHelp=När Nej döljs kursens per-låt-resultatsidor i utvärdering och slutförlopp.
AutosubmitIndividualHelp=Aktivera autoskick per låt i kurser (lagras för paritetskoppling).

[OptionsGrooveStatsHelp]
EnableGrooveStatsHelp=Aktivera anslutning till GrooveStats-tjänster.
EnableBoogieStatsHelp=Byt GrooveStats-tjänsternas URL:er till BoogieStats-ändpunkter.\nKräver att Aktivera GrooveStats är På.
GsSubmitFailsHelp=När Ja skickas misslyckade stages ändå till GrooveStats eller BoogieStats.\nStandard: Nej.
AutoPopulateScoresHelp=Importera GS-betyg/lampa/poäng när förfrågningar om scorebox-topplistor slutförs.
AutoDownloadUnlocksHelp=Ladda automatiskt ner upplåsningspaket som returneras av GrooveStats eventskick.\nAktiverar skärmen Visa nedladdningar i sorteringsmenyn när tjänsten är ansluten.
SeparateUnlocksByPlayerHelp=Ladda ner upplåsningspaket till mappar per spelare istället för en delad eventmapp.\nMatchar Simply Loves inställning SeparateUnlocksByPlayer.
EnableArrowCloudHelp=Aktivera anslutning till ArrowCloud-tjänster.
ArrowCloudSubmitFailsHelp=När Ja skickas misslyckade stages ändå till ArrowCloud.\nStandard: Nej.

[OptionsOnlineScoringHelp]
GsBsOptionsHelp=Öppna inställningar för GrooveStats / BoogieStats.
ArrowCloudOptionsHelp=Öppna inställningar för ArrowCloud.
ScoreImportHelp=Öppna verktyg för poängimport och val av ändpunkt/profil.
NullOrDieOptionsHelp=Öppna visning för null-or-die-analys och säkerhetsinställningar.
SyncPacksHelp=Öppna massynkverktyg för alla filer eller ett specifikt installerat paket.\nDetta öppnar ett lokalt granskningsöverlägg här efter att du valt mål.

[OptionsNullOrDieHelp]
SyncGraphHelp=Välj vilken null-or-die-graf som synköverlägget i Välj musik visar.\nFrekvens: viktad spektral ackumulator.\nBeat-index: beatvis digest över tid.\nFingeravtryck efter kärna: konvolutionsvärmekarta med slutligt kärnsvar.
SyncConfidenceHelp=Ställ in minsta säkerhet som krävs för att spara Synka paket.\nCharts under detta värde analyseras och visas, men hoppas över när ett paket sparas.\nSynk av en enskild låt tillåter fortfarande sparande under tröskeln och visar i stället en varning.
PackSyncThreadsHelp=Ställ in arbetstrådar som används för null-or-die-analys vid synk av paket/alla.\nAuto använder alla logiska kärnor; 1 håller analysen enkeltrådad.\nStandard: Auto (PackSyncThreads=0).
FingerprintHelp=Ställ in fingeravtryckets bredd runt varje beat under bias-analys.\nMindre värden fokuserar tätare runt varje beat; större värden jämför ett bredare fönster.
WindowHelp=Ställ in spektrogramfönstrets storlek i millisekunder.\nDetta ändrar hur mycket ljud som analyseras per FFT-skiva.
StepHelp=Ställ in spektrogrammets steglängd i millisekunder.\nLägre värden samplar tätare och kan öka analyskostnaden.
MagicOffsetHelp=Lägg till en fast offset till den slutliga uppskattade biasen.\nAnvändbart för att testa alternativa paritetsantaganden utan att redigera simfiles.
KernelTargetHelp=Välj om kärnan ska arbeta på digest- eller ackumulatordata.\nDigest matchar nuvarande standard.
KernelTypeHelp=Välj vilken kärnform som används för efterbearbetningens konvolution.\nRising matchar nuvarande standard.
FullSpectrogramHelp=Tillåt fullständiga spektrogrammetoden för fingeravtryck när null-or-die bedömer att det är lämpligt.\nDetta kan använda mer minne eller mer arbete för vissa charts.

[OptionsSyncPackHelp]
SyncPackPackHelp=Välj vilka installerade paket som ska inkluderas i synkkörningen.\nAlla paket analyserar alla installerade paket; ett specifikt paket begränsar körningen till just det paketet.
SyncPackStartHelp=Öppna det lokala synkgranskningsöverlägget för det valda paketfiltret.\nAnvänd Alla paket för att analysera alla installerade paket i ett svep.

[OptionsScoreImportHelp]
ScoreImportEndpointHelp=Välj källändpunkt att importera poäng från.\nGrooveStats, BoogieStats eller ArrowCloud.
ScoreImportProfileHelp=Välj en lokal profil som har autentiseringsuppgifter konfigurerade för denna ändpunkt.\nGS/BS kräver API-nyckel + användarnamn i groovestats.ini.\nAC kräver API-nyckel i arrowcloud.ini.
ScoreImportPackHelp=Välj vilket installerat paket som ska inkluderas i poängimporten.\nAnvänd Alla för att importera över alla installerade paket.
ScoreImportOnlyMissingHelp=När Ja importeras endast charts som ännu inte har något cachat GS-resultat.\nNär Nej begärs varje vald chart-hash.
ScoreImportStartHelp=Massimporterar den här profilens poäng för vald ändpunkt och paketfilter.\nHårt begränsat till 3 förfrågningar/sek för att undvika API-spam.\nFör många charts kan detta ta mer än en timme.
