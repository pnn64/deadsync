InputOptionsHelp=Öppna ytterligare inmatningsinställningar.
GamepadBackendHelp=Välj backend för gamepad-inmatning. På Windows är Raw Input standardvägen och WGI finns kvar som kompatibilitetsalternativ.\nByte av backend kräver omstart.
MenuButtonsHelp=Välj om spelknappar (t.ex. riktningspilar) får användas för menynavigering.\nAnvänd spelknappar - navigera genom spelet med din dansmatta.\nEndast dedikerade knappar - navigera genom spelet med särskilda menyknappar.\nFemknappsmeny kräver MenuUp, MenuDown, MenuLeft och MenuRight för minst en spelare.\nTreknappsmeny kräver MenuLeft, MenuRight och Start för minst en spelare.
OptionsNavigationHelp=Välj hur skärmar i stil med Player Options växlar mellan rader.\nStepMania-stil - upp/ner byter rader och Start hoppar till Avsluta.\nArkadstil - Start går till nästa rad och den aktiva raden visar en nedåtpil.
MenuNavigationHelp=Välj om kabinettlik menynavigering förväntar sig fem eller tre knappar per spelare.\nFemknappsmeny - använd MenuLeft, MenuRight, MenuUp, MenuDown och Start.\nTreknappsmeny - använd MenuLeft, MenuRight och Start.\nNär detta är aktiverat flyttas vissa UI-åtgärder från Select till en samtidig Left+Right-kombination.
DebounceHelp=Global debounce-tid per inmatning som används i menyer och spel för tangentbord och alla gamepad-drivrutiner.\nITGmanias standard är 20 ms. 50 ms var vanligt på äldre arkadplattor.

