[OptionsSoundHelp]
SoundDeviceHelp=Välj en utgångsenhet som upptäcktes vid start.\nAuto använder värdens standardutgångsenhet.\nWindows-uppspelning föredrar inbyggt WASAPI.\nmacOS-uppspelning föredrar inbyggt CoreAudio.\nFreeBSD-uppspelning föredrar inbyggt PCM/OSS.\nLinux-backendens routning beror på Linux Audio Backend; ALSA:s exklusiva routning ställs in separat.\nÄndringen träder i kraft nästa start.
AudioOutputModeHelp=Välj om ljudutgången ska använda Auto eller Delat läge.\nAuto behåller backendens standardpolicy.\nDelat tvingar delat läge där det stöds.\nExklusivt läge exponeras separat när Linux Audio Backend är satt till ALSA.\nÄndringen träder i kraft nästa start.
LinuxAudioBackendHelp=Välj vilken Linux-backend som ska föredras.\nBackendar som visas i menyn beror på vad bygget innehåller.\nAuto föredrar PipeWire först när tillgängligt, sedan PulseAudio och faller tillbaka till ALSA vid behov.\nPipeWire och PulseAudio är backendar för delad utgång och ignorerar för närvarande explicit val av ljudenhet.\nJACK är en explicit backend med låg latens och ignorerar för närvarande val av ljudenhet.\nALSA är den direkta Linux-backenden och visar den underordnade raden Exklusivt läge.\nÄndringen träder i kraft nästa start.
AlsaExclusiveHelp=Begär ALSA-utgång i exklusivt läge för vald enhet.\nAv behåller ALSA i det normala delade läget.\nPå kräver en direkt hw/plughw-enhet eller ett upplösbart alias som pekar på hårdvara.\nÄndringen träder i kraft nästa start.
AudioSampleRateHelp=Välj ljudutgångens samplingsfrekvens för den valda ljudenheten.
MasterVolumeHelp=Ställ in den övergripande volymen för allt ljud.
SfxVolumeHelp=Ställ in effektvolymen innan huvudvolymen appliceras.
AssistTickVolumeHelp=Ställ in Assist Tick-volymen innan huvudvolymen appliceras.
MusicVolumeHelp=Ställ in musikvolymen innan huvudvolymen appliceras.
MineSoundsHelp=Spela ett ljud när minor träffas.
GlobalOffsetHelp=Applicera en global ljudförskjutning i steg om 1 ms.
RateModPreservesPitchHelp=Behåll tonhöjden konstant när hastighetsmoddar är aktiva.

[OptionsInputHelp]
ConfigureMappingsHelp=Mappar tangentbordsknappar, paneler, menyknappar osv. till spelfunktioner.
