[package]
name = "deadsync-platform"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"

[dependencies]
chrono = "0.4.45"
env_logger = "0.11.10"
log = "0.4.32"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.62.2", features = [
    "Win32_Foundation",
    "Win32_System_Performance",
    "Win32_System_Threading",
] }

[target.'cfg(all(unix, not(target_os = "macos")))'.dependencies]
xcb = { version = "1.7.0", features = ["dpms", "screensaver"] }

[lints.clippy]
perf = { level = "warn", priority = -1 }

inline_always = "allow"
