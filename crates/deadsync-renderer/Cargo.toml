[package]
name = "deadsync-renderer"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"

[dependencies]
deadsync-render = { path = "../deadsync-render" }
deadsync-render-backend-gl = { path = "../deadsync-render-backend-gl" }
deadsync-render-backend-software = { path = "../deadsync-render-backend-software" }
deadsync-render-backend-wgpu = { path = "../deadsync-render-backend-wgpu" }
image = "0.25.10"
winit = "0.30.13"

[target.'cfg(all(not(target_pointer_width = "32"), not(target_vendor = "win7")))'.dependencies]
deadsync-render-backend-vulkan = { path = "../deadsync-render-backend-vulkan" }

[lints.clippy]
perf = { level = "warn", priority = -1 }

inline_always = "allow"
