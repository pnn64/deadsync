[package]
name = "deadsync-profile"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"

[features]
bench-support = []

[[bench]]
name = "gameplay_hud_snapshot"
harness = false
required-features = ["bench-support"]

[[bench]]
name = "favorite_pack_ordering"
harness = false
required-features = ["bench-support"]

[[bench]]
name = "machine_record_lookup"
harness = false
required-features = ["bench-support"]

[[bench]]
name = "case_insensitive_ordering"
harness = false
required-features = ["bench-support"]

[dependencies]
bincode = "2.0.1"
bitflags = "2.13.1"
chrono = "0.4.45"
deadlib-platform = { path = "../deadlib-platform" }
log = "0.4.33"
uuid = { version = "1.24.0", features = ["v4", "v5"] }
deadsync-rules = { path = "../deadsync-rules" }
deadsync-score = { path = "../deadsync-score" }
deadsync-chart = { path = "../deadsync-chart" }
deadsync-config = { path = "../deadsync-config" }

[lints.clippy]
perf = { level = "warn", priority = -1 }

inline_always = "allow"
