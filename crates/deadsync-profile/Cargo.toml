[package]
name = "deadsync-profile"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"

[dependencies]
bincode = "2.0.1"
bitflags = "2.13.0"
chrono = "0.4.45"
deadlib-platform = { path = "../deadlib-platform" }
log = "0.4.33"
uuid = { version = "1.23.3", features = ["v4", "v5"] }
