[package]
name = "deadsync-score"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"

[features]
bench-support = []

[[bench]]
name = "scorebox_pane_kind"
harness = false
required-features = ["bench-support"]

[[bench]]
name = "score_import_hashes"
harness = false
required-features = ["bench-support"]

[dependencies]
bincode = "2.0.1"
chrono = "0.4.45"
deadsync-chart = { path = "../deadsync-chart" }
deadsync-core = { path = "../deadsync-core" }
deadsync-rules = { path = "../deadsync-rules" }
hashbrown = "0.17.1"
log = "0.4.33"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"

[lints.clippy]
perf = { level = "warn", priority = -1 }

inline_always = "allow"
