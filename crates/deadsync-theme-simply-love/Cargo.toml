deadsync-updater = { path = "../deadsync-updater" }
deadsync-version = { path = "../deadsync-version" }
bitflags = "2.13.0"
chrono = "0.4.45"
glam = "0.33.1"
image = "0.25.10"
log = "0.4.33"
null-or-die = { git = "https://github.com/pnn64/null-or-die", branch = "main" }
