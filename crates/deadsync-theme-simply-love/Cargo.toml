deadsync-audio-stream = { path = "../deadsync-audio-stream" }
deadsync-chart = { path = "../deadsync-chart" }
deadsync-config = { path = "../deadsync-config" }
deadsync-core = { path = "../deadsync-core" }
deadsync-gameplay = { path = "../deadsync-gameplay" }
deadsync-import = { path = "../deadsync-import" }
deadsync-input = { path = "../deadsync-input" }
deadsync-input-native = { path = "../deadsync-input-native" }
deadsync-lights = { path = "../deadsync-lights" }
deadsync-notefield = { path = "../deadsync-notefield" }
deadsync-noteskin = { path = "../deadsync-noteskin" }
deadsync-online = { path = "../deadsync-online" }
