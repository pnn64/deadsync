[package]
name = "deadsync-song-lua"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"

[features]
bench-support = []

[[bench]]
name = "prefsmgr_defaults"
harness = false
required-features = ["bench-support"]

[[bench]]
name = "media_path_classification"
harness = false
required-features = ["bench-support"]

[dependencies]
deadlib-assets = { path = "../deadlib-assets" }
deadlib-present = { path = "../deadlib-present" }
chrono = "0.4.45"
image = "0.25.10"
log = "0.4.33"
mlua = { version = "0.12.0", features = ["lua54", "vendored"] }
serde_json = "1.0.150"

[lints.clippy]
perf = { level = "warn", priority = -1 }

inline_always = "allow"
