[package]
name = "deadsync-online"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"

[features]
bench-support = []

[[bench]]
name = "pack_search_index"
harness = false
required-features = ["bench-support"]

[[bench]]
name = "catalog_cell_cleaning"
harness = false
required-features = ["bench-support"]

[dependencies]
deadlib-platform = { path = "../deadlib-platform" }
deadsync-config = { path = "../deadsync-config" }
deadsync-chart = { path = "../deadsync-chart" }
deadsync-core = { path = "../deadsync-core" }
deadsync-gameplay = { path = "../deadsync-gameplay" }
deadsync-net = { path = "../deadsync-net" }
deadsync-profile = { path = "../deadsync-profile" }
deadsync-profile-gameplay = { path = "../deadsync-profile-gameplay" }
deadsync-rules = { path = "../deadsync-rules" }
deadsync-score = { path = "../deadsync-score" }
deadsync-simfile = { path = "../deadsync-simfile" }
deadsync-version = { path = "../deadsync-version" }
chrono = "0.4.45"
log = "0.4.33"
rand = "0.10.2"
serde = { version = "1.0.229", features = ["derive"] }
serde_json = "1.0.151"
tungstenite = "0.30.0"
zip = { version = "8.6.0", default-features = false, features = ["deflate-flate2-zlib-rs"] }

[lints.clippy]
perf = { level = "warn", priority = -1 }

inline_always = "allow"
