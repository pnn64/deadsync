[package]
name = "deadsync-online"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"

[dependencies]
deadlib-platform = { path = "../deadlib-platform" }
deadsync-config = { path = "../deadsync-config" }
deadsync-core = { path = "../deadsync-core" }
deadsync-net = { path = "../deadsync-net" }
deadsync-profile = { path = "../deadsync-profile" }
deadsync-rules = { path = "../deadsync-rules" }
deadsync-score = { path = "../deadsync-score" }
deadsync-version = { path = "../deadsync-version" }
log = "0.4.33"
rand = "0.10.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tungstenite = "0.29.0"
zip = { version = "8.6.0", default-features = false, features = ["deflate-flate2-zlib-rs"] }

[lints.clippy]
perf = { level = "warn", priority = -1 }

inline_always = "allow"
