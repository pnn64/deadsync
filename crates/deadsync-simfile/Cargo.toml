[package]
name = "deadsync-simfile"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"

[dependencies]
bincode = "2.0.1"
deadlib-platform = { path = "../deadlib-platform" }
deadsync-audio-decode = { path = "../deadsync-audio-decode" }
deadsync-chart = { path = "../deadsync-chart" }
deadsync-config = { path = "../deadsync-config" }
deadsync-core = { path = "../deadsync-core" }
deadsync-rules = { path = "../deadsync-rules" }
image = "0.25.10"
log = "0.4.33"
rssp = { git = "https://github.com/pnn64/rssp", branch = "main" }
serde = { version = "1.0.228", features = ["derive"] }
twox-hash = "2.1.2"

[lints.clippy]
perf = { level = "warn", priority = -1 }

inline_always = "allow"
