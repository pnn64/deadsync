[package]
name = "deadsync"
version = "0.3.482"
authors = ["Patrik Nilsson <perfecttaste@pm.me>"]
edition = "2024"
description = "A competitive SM/ITG engine focused on perfect sync and performance."
license = "GPL-3.0"
repository = "https://github.com/pnn64/deadsync"
keywords = ["deadsync", "stepmania", "itg", "inthegroove", "rhythmgame", "vulkan"]

[[bin]]
name = "compose_bench"
path = "tests/compose/bench.rs"

[[bin]]
name = "draw_bench"
path = "tests/draw/bench.rs"

[[bin]]
name = "input_bench"
path = "tests/input/bench.rs"

[[bin]]
name = "input_e2e_bench"
path = "tests/input_e2e/bench.rs"

[[bin]]
name = "lang_coverage"
path = "scripts/lang_coverage.rs"

[[bin]]
name = "generate_pseudo"
path = "scripts/generate_pseudo.rs"


[features]
pipewire-audio = ["dep:pipewire"]

[dependencies]
winit = "0.30.13"
log = "0.4.29"
env_logger = "0.11.10"
image = "0.25.10"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
rand = "0.10.1"
chrono = "0.4.44"
qrcodegen = "1.8.0"
mlua = { version = "0.11.6", features = ["lua54", "vendored"] }
rustc-hash = "2.1.2"
smallvec = "1.15.1"

# rssp and null-or-die
rssp = { git = "https://github.com/pnn64/rssp", branch = "main" }
null-or-die = { git = "https://github.com/pnn64/null-or-die", branch = "main" }

# Software renderer
softbuffer = "0.4.8"

# Math
glam = "0.32.1"
bytemuck = { version = "1.25.0", features = ["derive"] }

# OpenGL Dependencies
glow = "0.17.0"
glutin = "0.32.3"
raw-window-handle = "0.6.2"
pollster = "0.4.0"

# Audio
lewton = "0.10.2"
ogg = "0.9.2"
minimp3 = "0.6.1"
claxon = "0.4.3"
opusic-c = "1.5.5"
rubato = "0.16.2"
memmap2 = "0.9.10"

# Networking
ureq = { version = "3.3.0", features = ["json", "rustls"] }
tungstenite = "0.29.0"

# Unlocks
zip = { version = "8.5.1", default-features = false, features = ["deflate"] }

# Platform-native data directories
directories = "6.0.0"

# Song cache
bincode = "2.0.1"
twox-hash = "2.1.2"

# Localization
rust-ini = "0.21.3"
sys-locale = "0.3.2"
tokio = { version = "1.52.0", features = ["rt"] }
bitflags = "2.11.1"

# DirectX + Input (Windows)
[target.'cfg(windows)'.dependencies]
gpu-allocator = "0.28.0"
windows = { version = "0.62.2", features = [
    "Foundation",
    "Foundation_Collections",
    "Gaming",
    "Gaming_Input",
    "Win32_Foundation",
    "Win32_Media",
    "Win32_Media_Audio",
    "Win32_Media_KernelStreaming",
    "Win32_Media_Multimedia",
    "Win32_Devices_FunctionDiscovery",
    "Win32_Graphics_Gdi",
    "Win32_Devices_HumanInterfaceDevice",
    "Win32_Devices_Display",
    "Win32_System_Com",
    "Win32_System_Com_StructuredStorage",
    "Win32_System_Performance",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_Shell_PropertiesSystem",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_Threading",
    "Win32_System_LibraryLoader",
    "Win32_System_Variant",
    "Win32_System_WinRT",
] }
windows-core = "0.62.2"
windows-targets = "0.53.5"

[target.'cfg(not(target_pointer_width = "32"))'.dependencies]
ash = { version = "0.38.0", features = ["linked"] }
ash-window = "0.13.0"

[target.'cfg(all(not(target_pointer_width = "32"), target_os = "windows"))'.dependencies]
wgpu = { version = "29.0.1", features = ["dx12", "vulkan", "gles"] }

[target.'cfg(all(not(target_pointer_width = "32"), not(target_os = "windows")))'.dependencies]
wgpu = { version = "29.0.1", features = ["vulkan", "gles"] }

[target.'cfg(all(target_pointer_width = "32", target_os = "windows"))'.dependencies]
wgpu = { version = "29.0.1", features = ["dx12", "gles"] }

[target.'cfg(all(target_pointer_width = "32", not(target_os = "windows")))'.dependencies]
wgpu = { version = "29.0.1", features = ["gles"] }

[target.'cfg(all(unix, not(target_os = "macos")))'.dependencies]
libc = "0.2.185"
xcb = { version = "1.7.0", features = ["randr"] }
smithay-client-toolkit = { version = "0.20.0", default-features = false }

[target.'cfg(target_os = "freebsd")'.dependencies]
hidparser = "1.0.3"

[target.'cfg(target_os = "linux")'.dependencies]
alsa = "0.11.0"
libloading = "0.9.0"
pipewire = { version = "0.9.2", optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
coreaudio = { package = "coreaudio-rs", version = "0.14.1" }
mach2 = "0.6.0"
objc2 = { version = "0.6.4", features = ["relax-sign-encoding"] }
objc2-app-kit = "0.3.2"
objc2-core-audio = "0.3.2"
objc2-core-foundation = "0.3.2"
objc2-core-graphics = "0.3.2"
objc2-foundation = "0.3.2"

[build-dependencies]
fs_extra = "1.3.0"
glob = "0.3.3"
shaderc = "0.10.1"

[target.'cfg(windows)'.build-dependencies]
winres = "0.1.12"

[profile.release]
opt-level = 3
overflow-checks = false
debug-assertions = false
lto = true
debug = false
panic = "abort"

[profile.local]
inherits = "release"
lto = "thin"

[lints.clippy]
perf = { level = "warn", priority = -1 }

inline_always = "allow"
