name: update-translation-status

on:
  push:
    branches: [main]
    paths:
      - "assets/languages/*.ini"

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate TRANSLATION_STATUS.md
        run: |
          mkdir -p target/tools
          rustc --edition=2024 scripts/lang_coverage.rs -o target/tools/lang_coverage
          ./target/tools/lang_coverage --markdown

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TRANSLATION_STATUS.md
          if git diff --cached --quiet; then
            echo "No changes to TRANSLATION_STATUS.md"
          else
            git commit -m "docs: auto-update TRANSLATION_STATUS.md"
            git push
          fi
