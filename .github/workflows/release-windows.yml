name: release-windows

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: "Release tag (example: v0.2.22)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.2.22)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Install Vulkan SDK
        shell: pwsh
        run: scripts/install-vulkan-sdk.ps1

      - name: Install Ninja
        shell: pwsh
        run: scripts/install-ninja.ps1

      - name: Install CMake
        shell: pwsh
        run: scripts/install-cmake.ps1

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          tag="${tag#refs/tags/}"
          if [ -z "${tag}" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --locked

      - name: Package Windows release
        id: package
        shell: pwsh
        run: scripts/package-windows-release.ps1 -Tag "${{ steps.tag.outputs.tag }}" -Arch x86_64

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deadsync-windows-${{ steps.tag.outputs.tag }}-x86_64
          if-no-files-found: error
          path: ${{ steps.package.outputs.archive }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.package.outputs.archive }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          fail_on_unmatched_files: true
