name: release-linux

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: "Release tag (example: v0.2.22)"
        required: true
        type: string
      arch:
        description: "Build target arch"
        required: false
        default: all
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.2.22)"
        required: true
        type: string
      arch:
        description: "Build target arch"
        required: false
        default: all
        type: choice
        options:
          - all
          - x86_64
          - arm64

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - arch: x86_64
            target: native
          - arch: arm64
            target: aarch64-unknown-linux-gnu
    runs-on:
      - self-hosted
      - Linux
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Select matrix arch
        id: select_arch
        shell: bash
        run: |
          selected="all"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            selected="${{ github.event.inputs.arch }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            selected="${{ inputs.arch }}"
          fi
          if [ -z "${selected}" ]; then
            selected="all"
          fi
          if [ "${selected}" = "all" ] || [ "${selected}" = "${{ matrix.arch }}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping matrix arch '${{ matrix.arch }}' for requested arch '${selected}'."
          fi

      - name: Resolve release tag
        id: tag
        if: steps.select_arch.outputs.enabled == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          tag="${tag#refs/tags/}"
          if [ -z "${tag}" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Setup Rust
        if: steps.select_arch.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Add Linux ARM64 Rust target
        if: steps.select_arch.outputs.enabled == 'true' && matrix.arch == 'arm64'
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Install Linux native deps (best effort)
        if: steps.select_arch.outputs.enabled == 'true' && matrix.arch == 'x86_64'
        shell: bash
        run: |
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "apt-get not found; skipping auto-install."
            exit 0
          fi
          if ! command -v sudo >/dev/null 2>&1; then
            echo "sudo not found; skipping auto-install."
            exit 0
          fi
          if ! sudo -n true 2>/dev/null; then
            echo "passwordless sudo unavailable; skipping auto-install."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            cmake \
            pkg-config \
            libudev-dev \
            libasound2-dev \
            libvulkan-dev \
            libgl1-mesa-dev

      - name: Install Linux ARM64 deps (best effort)
        if: steps.select_arch.outputs.enabled == 'true' && matrix.arch == 'arm64'
        shell: bash
        run: |
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "apt-get not found; skipping auto-install."
            exit 0
          fi
          if ! command -v sudo >/dev/null 2>&1; then
            echo "sudo not found; skipping auto-install."
            exit 0
          fi
          if ! sudo -n true 2>/dev/null; then
            echo "passwordless sudo unavailable; skipping auto-install."
            exit 0
          fi
          sudo dpkg --add-architecture arm64
          if [ -r /etc/os-release ]; then
            # shellcheck disable=SC1091
            . /etc/os-release
          fi
          if [ "${ID:-}" = "ubuntu" ]; then
            codename="${VERSION_CODENAME:-${UBUNTU_CODENAME:-}}"
            if [ -n "${codename}" ]; then
              if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
                if grep -q '^Architectures:' /etc/apt/sources.list.d/ubuntu.sources; then
                  sudo sed -Ei 's/^Architectures:.*/Architectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
                else
                  sudo sed -i '/^Suites:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
                fi
                printf '%s\n' \
                  "Types: deb" \
                  "URIs: http://ports.ubuntu.com/ubuntu-ports" \
                  "Suites: ${codename} ${codename}-updates ${codename}-backports ${codename}-security" \
                  "Components: main restricted universe multiverse" \
                  "Architectures: arm64" \
                  "Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg" \
                  | sudo tee /etc/apt/sources.list.d/ubuntu-arm64.sources >/dev/null
              elif [ -f /etc/apt/sources.list ]; then
                sudo sed -Ei '/^[[:space:]]*deb[[:space:]]+/ { /\[arch=/! s|^[[:space:]]*deb[[:space:]]+|deb [arch=amd64] | }' /etc/apt/sources.list
                printf '%s\n' \
                  "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename} main restricted universe multiverse" \
                  "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename}-updates main restricted universe multiverse" \
                  "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename}-backports main restricted universe multiverse" \
                  "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename}-security main restricted universe multiverse" \
                  | sudo tee /etc/apt/sources.list.d/ubuntu-arm64.list >/dev/null
              fi
            fi
          fi
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            cmake \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            pkg-config \
            libudev-dev:arm64 \
            libasound2-dev:arm64 \
            libvulkan-dev:arm64 \
            libgl1-mesa-dev:arm64

      - name: Verify Linux native deps
        if: steps.select_arch.outputs.enabled == 'true' && matrix.arch == 'x86_64'
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if ! command -v pkg-config >/dev/null 2>&1; then
            echo "::error::pkg-config is missing."
            exit 1
          fi
          if ! pkg-config --exists vulkan; then
            echo "::error::Missing Vulkan dev package. Install libvulkan-dev (or distro equivalent)."
            missing=1
          fi
          if ! pkg-config --exists alsa; then
            echo "::error::Missing ALSA dev package. Install libasound2-dev (or distro equivalent)."
            missing=1
          fi
          if ! pkg-config --exists libudev; then
            echo "::error::Missing libudev dev package. Install libudev-dev (or distro equivalent)."
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Verify Linux ARM64 deps
        if: steps.select_arch.outputs.enabled == 'true' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if ! command -v pkg-config >/dev/null 2>&1; then
            echo "::error::pkg-config is missing."
            exit 1
          fi
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          if ! command -v aarch64-linux-gnu-gcc >/dev/null 2>&1; then
            echo "::error::Missing aarch64-linux-gnu-gcc. Install gcc-aarch64-linux-gnu."
            missing=1
          fi
          if ! pkg-config --exists vulkan; then
            echo "::error::Missing ARM64 Vulkan dev package. Install libvulkan-dev:arm64."
            missing=1
          fi
          if ! pkg-config --exists alsa; then
            echo "::error::Missing ARM64 ALSA dev package. Install libasound2-dev:arm64."
            missing=1
          fi
          if ! pkg-config --exists libudev; then
            echo "::error::Missing ARM64 libudev dev package. Install libudev-dev:arm64."
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Build release
        if: steps.select_arch.outputs.enabled == 'true' && matrix.arch == 'x86_64'
        run: cargo build --release --locked

      - name: Build release (ARM64 cross)
        if: steps.select_arch.outputs.enabled == 'true' && matrix.arch == 'arm64'
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu

      - name: Package Linux release
        id: package
        if: steps.select_arch.outputs.enabled == 'true'
        shell: bash
        run: bash scripts/package-linux-release.sh "${{ steps.tag.outputs.tag }}" "${{ matrix.arch }}" "${{ matrix.target }}"

      - name: Upload workflow artifacts
        if: steps.select_arch.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deadsync-linux-${{ steps.tag.outputs.tag }}-${{ matrix.arch }}
          if-no-files-found: error
          path: ${{ steps.package.outputs.archive }}

      - name: Publish GitHub release
        if: steps.select_arch.outputs.enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.package.outputs.archive }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          fail_on_unmatched_files: true
