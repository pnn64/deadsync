name: release-linux

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: "Release tag (example: v0.2.22)"
        required: true
        type: string
      arch:
        description: "Build target arch"
        required: false
        default: all
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.2.22)"
        required: true
        type: string
      arch:
        description: "Build target arch"
        required: false
        default: all
        type: choice
        options:
          - all
          - x86_64
          - arm64

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - arch: x86_64
            target: native
          - arch: arm64
            target: aarch64-unknown-linux-gnu
    runs-on:
      - self-hosted
      - Linux
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Select matrix arch
        id: select_arch
        shell: bash
        run: |
          selected="all"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            selected="${{ github.event.inputs.arch }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            selected="${{ inputs.arch }}"
          fi
          if [ -z "${selected}" ]; then
            selected="all"
          fi
          if [ "${selected}" = "all" ] || [ "${selected}" = "${{ matrix.arch }}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping matrix arch '${{ matrix.arch }}' for requested arch '${selected}'."
          fi

      - name: Resolve release tag
        id: tag
        if: steps.select_arch.outputs.enabled == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          tag="${tag#refs/tags/}"
          if [ -z "${tag}" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Verify Docker access
        if: steps.select_arch.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo "::error::docker is required on the Linux release runner."
            exit 1
          fi
          docker version >/dev/null

      - name: Build release in Debian 12 container
        if: steps.select_arch.outputs.enabled == 'true'
        env:
          LINUX_BUILD_IMAGE: debian:12
        run: bash scripts/build-linux-release-docker.sh "${{ matrix.arch }}" "${{ matrix.target }}"

      - name: Package Linux release
        id: package
        if: steps.select_arch.outputs.enabled == 'true'
        shell: bash
        run: bash scripts/package-linux-release.sh "${{ steps.tag.outputs.tag }}" "${{ matrix.arch }}" "${{ matrix.target }}"

      - name: Upload workflow artifacts
        if: steps.select_arch.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deadsync-linux-${{ steps.tag.outputs.tag }}-${{ matrix.arch }}
          if-no-files-found: error
          path: ${{ steps.package.outputs.archive }}

      - name: Publish GitHub release
        if: steps.select_arch.outputs.enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.package.outputs.archive }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          fail_on_unmatched_files: true
