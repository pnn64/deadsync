name: release-linux

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.2.22)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on:
      - self-hosted
      - Linux
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Linux build deps (best effort)
        shell: bash
        run: |
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "apt-get not found; skipping auto-install."
            exit 0
          fi
          if ! command -v sudo >/dev/null 2>&1; then
            echo "sudo not found; skipping auto-install."
            exit 0
          fi
          if ! sudo -n true 2>/dev/null; then
            echo "passwordless sudo unavailable; skipping auto-install."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            cmake \
            pkg-config \
            libudev-dev \
            libasound2-dev \
            libvulkan-dev \
            libgl1-mesa-dev

      - name: Verify Linux native deps
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if ! command -v pkg-config >/dev/null 2>&1; then
            echo "::error::pkg-config is missing."
            exit 1
          fi
          if ! pkg-config --exists vulkan; then
            echo "::error::Missing Vulkan dev package. Install libvulkan-dev (or distro equivalent)."
            missing=1
          fi
          if ! pkg-config --exists alsa; then
            echo "::error::Missing ALSA dev package. Install libasound2-dev (or distro equivalent)."
            missing=1
          fi
          if ! pkg-config --exists libudev; then
            echo "::error::Missing libudev dev package. Install libudev-dev (or distro equivalent)."
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          tag="${tag#refs/tags/}"
          if [ -z "${tag}" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --locked

      - name: Package Linux release
        id: package
        shell: bash
        run: bash scripts/package-linux-release.sh "${{ steps.tag.outputs.tag }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deadsync-linux-${{ steps.tag.outputs.tag }}-${{ runner.arch }}
          if-no-files-found: error
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          fail_on_unmatched_files: true
