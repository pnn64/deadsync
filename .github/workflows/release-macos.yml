name: release-macos

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: "Release tag (example: v0.2.22)"
        required: true
        type: string
      arch:
        description: "Build target arch"
        required: false
        default: all
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.2.22)"
        required: true
        type: string
      arch:
        description: "Build target arch"
        required: false
        default: all
        type: choice
        options:
          - all
          - arm64
          - x86_64

permissions:
  contents: write

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set-matrix.outputs.include }}
    steps:
      - name: Resolve matrix
        id: set-matrix
        shell: bash
        run: |
          selected="all"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            selected="${{ github.event.inputs.arch }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            selected="${{ inputs.arch }}"
          fi
          if [ -z "${selected}" ]; then
            selected="all"
          fi

          case "${selected}" in
            arm64)
              include='[{"arch":"arm64","runner":"macos-15"}]'
              ;;
            x86_64)
              include='[{"arch":"x86_64","runner":"macos-15-intel"}]'
              ;;
            all)
              include='[{"arch":"arm64","runner":"macos-15"},{"arch":"x86_64","runner":"macos-15-intel"}]'
              ;;
            *)
              echo "::error::Invalid arch '${selected}'. Expected one of: all, arm64, x86_64."
              exit 1
              ;;
          esac

          echo "include=${include}" >> "${GITHUB_OUTPUT}"

  build-release:
    needs: prepare-matrix
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.prepare-matrix.outputs.include) }}
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install macOS Vulkan deps
        shell: bash
        run: |
          set -euo pipefail
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install vulkan-loader molten-vk
          brew_prefix="$(brew --prefix)"
          if [ ! -f "${brew_prefix}/lib/libvulkan.dylib" ] && [ ! -f "${brew_prefix}/opt/vulkan-loader/lib/libvulkan.dylib" ]; then
            echo "::error::libvulkan.dylib not found after Homebrew install."
            exit 1
          fi
          lib_dirs="${brew_prefix}/lib:${brew_prefix}/opt/vulkan-loader/lib"
          echo "LIBRARY_PATH=${lib_dirs}${LIBRARY_PATH:+:${LIBRARY_PATH}}" >> "${GITHUB_ENV}"
          echo "DYLD_FALLBACK_LIBRARY_PATH=${lib_dirs}${DYLD_FALLBACK_LIBRARY_PATH:+:${DYLD_FALLBACK_LIBRARY_PATH}}" >> "${GITHUB_ENV}"
          echo "RUSTFLAGS=-L native=${brew_prefix}/lib -L native=${brew_prefix}/opt/vulkan-loader/lib" >> "${GITHUB_ENV}"

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          tag="${tag#refs/tags/}"
          if [ -z "${tag}" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --locked

      - name: Package macOS release
        id: package
        shell: bash
        run: bash scripts/package-macos-release.sh "${{ steps.tag.outputs.tag }}" "${{ matrix.arch }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deadsync-macos-${{ steps.tag.outputs.tag }}-${{ matrix.arch }}
          if-no-files-found: error
          path: ${{ steps.package.outputs.archive }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.package.outputs.archive }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          fail_on_unmatched_files: true
